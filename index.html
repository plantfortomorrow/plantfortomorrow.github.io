<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant for Tomorrow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }
        #canvas-wrap {
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .org {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div id="canvas-wrap"></div>
    <h1>plant for tomorrow</h1>
    <p class="org">plantfortomorrow.org</p>

    <script>
    // --- Forces ---
    const WIND_SPEED = 0.4;       // 0 = still, 1 = strong gusts
    const WIND_TURBULENCE = 0.6;  // how chaotic the wind is
    const GRAVITY = 0.02;
    const DAMPING = 0.92;
    const STIFFNESS = 0.08;

    const W = 900;
    const H = 860;
    const GROUND_Y = H - 80;

    let plants = [];

    function setup() {
        let canvas = createCanvas(W, H);
        canvas.parent('canvas-wrap');

        plants.push(new Plant(W * 0.22, GROUND_Y, 11, 6.4, 0.0));
        plants.push(new Plant(W * 0.52, GROUND_Y, 14, 7.0, 100));
        plants.push(new Plant(W * 0.78, GROUND_Y, 10, 6.0, 200));
    }

    function draw() {
        background(10);

        // ground
        noStroke();
        for (let i = 0; i < 70; i++) {
            let gx = noise(i * 0.3, 999) * W;
            let gy = GROUND_Y + noise(i * 0.5, 888) * 50;
            fill(30 + noise(i * 0.7) * 16, 50 + noise(i * 0.9) * 20, 25 + noise(i * 0.4) * 12, 120);
            text('~', gx, gy);
        }

        // wind force from Perlin noise
        let t = frameCount * 0.008;
        let windBase = (noise(t) - 0.45) * WIND_SPEED;
        let gust = (noise(t * 3.0 + 50) - 0.5) * WIND_SPEED * WIND_TURBULENCE;
        let windForce = windBase + gust;

        for (let p of plants) {
            p.applyWind(windForce, t);
            p.update();
            p.draw();
        }
    }

    class Plant {
        constructor(x, groundY, segCount, segLen, noiseSeed) {
            this.baseX = x;
            this.baseY = groundY;
            this.segCount = segCount;
            this.segLen = segLen;
            this.noiseSeed = noiseSeed;
            this.segments = [];
            this.leaves = [];

            // build segments from ground up
            for (let i = 0; i < segCount; i++) {
                this.segments.push({
                    angle: 0,        // deflection from vertical
                    velocity: 0,
                    restAngle: 0,
                    // how much this segment responds to wind (more at top)
                    windFactor: map(i, 0, segCount - 1, 0.1, 1.0),
                    // stiffness decreases toward top
                    stiffness: map(i, 0, segCount - 1, STIFFNESS * 1.5, STIFFNESS * 0.6),
                });
            }

            // place leaves at specific segments
            let leafPositions = [
                { seg: floor(segCount * 0.3), side: 1, size: 0.8 },
                { seg: floor(segCount * 0.45), side: -1, size: 1.0 },
                { seg: floor(segCount * 0.6), side: 1, size: 0.9 },
                { seg: floor(segCount * 0.75), side: -1, size: 0.7 },
            ];
            for (let lp of leafPositions) {
                if (lp.seg < segCount) {
                    this.leaves.push(lp);
                }
            }

            // flower properties
            this.petalCount = floor(random(10, 16));
            this.petalSizes = [];
            for (let i = 0; i < this.petalCount; i++) {
                this.petalSizes.push(random(0.8, 1.2));
            }
        }

        applyWind(windForce, t) {
            for (let i = 0; i < this.segments.length; i++) {
                let seg = this.segments[i];
                // each segment gets slightly different wind via noise offset
                let localWind = windForce * seg.windFactor;
                let turbulence = (noise(t * 2 + i * 0.3 + this.noiseSeed) - 0.5) * 0.02 * WIND_TURBULENCE;
                seg.velocity += localWind * 0.015 + turbulence;
            }
        }

        update() {
            for (let seg of this.segments) {
                // spring force back to rest
                let springForce = -(seg.angle - seg.restAngle) * seg.stiffness;
                // gravity pulls back to vertical
                let gravityForce = -sin(seg.angle) * GRAVITY;
                seg.velocity += springForce + gravityForce;
                seg.velocity *= DAMPING;
                seg.angle += seg.velocity;
                // clamp to prevent wild swings
                seg.angle = constrain(seg.angle, -0.4, 0.4);
            }
        }

        draw() {
            // compute segment positions from base up
            let points = [{ x: this.baseX, y: this.baseY }];
            let cumulativeAngle = 0;

            for (let i = 0; i < this.segments.length; i++) {
                let seg = this.segments[i];
                cumulativeAngle += seg.angle;
                let prev = points[points.length - 1];
                let px = prev.x + sin(cumulativeAngle) * this.segLen;
                let py = prev.y - cos(cumulativeAngle) * this.segLen;
                points.push({ x: px, y: py, cumAngle: cumulativeAngle });
            }

            // draw stem
            noFill();
            for (let w = 0; w < 2; w++) {
                let sw = w === 0 ? 7 : 3;
                let sc = w === 0 ? color(55, 95, 65) : color(74, 124, 89);
                stroke(sc);
                strokeWeight(sw);
                beginShape();
                curveVertex(points[0].x, points[0].y);
                for (let p of points) {
                    curveVertex(p.x, p.y);
                }
                curveVertex(points[points.length - 1].x, points[points.length - 1].y);
                endShape();
            }

            // draw leaves
            for (let lf of this.leaves) {
                let segIdx = lf.seg;
                let pt = points[segIdx + 1];
                let ang = pt.cumAngle + (lf.side * (PI * 0.3));
                this.drawLeaf(pt.x, pt.y, ang, lf.side, lf.size, points[segIdx + 1].cumAngle);
            }

            // draw flower at top
            let tip = points[points.length - 1];
            let tipAngle = points[points.length - 1].cumAngle;
            this.drawFlower(tip.x, tip.y, tipAngle);
        }

        drawLeaf(x, y, angle, side, sz, stemAngle) {
            push();
            translate(x, y);
            rotate(stemAngle + side * 0.8);

            let leafLen = 36 * sz;
            let leafWidth = 14 * sz;

            // leaf shape
            noStroke();
            fill(90, 158, 111, 200);
            beginShape();
            vertex(0, 0);
            bezierVertex(
                side * leafWidth * 0.5, -leafLen * 0.3,
                side * leafWidth, -leafLen * 0.6,
                side * 4, -leafLen
            );
            bezierVertex(
                side * -leafWidth * 0.3, -leafLen * 0.7,
                side * -leafWidth * 0.2, -leafLen * 0.3,
                0, 0
            );
            endShape(CLOSE);

            // leaf vein
            stroke(61, 107, 74);
            strokeWeight(1.5);
            noFill();
            beginShape();
            vertex(0, 0);
            bezierVertex(
                side * leafWidth * 0.15, -leafLen * 0.3,
                side * leafWidth * 0.3, -leafLen * 0.5,
                side * 4, -leafLen
            );
            endShape();

            pop();
        }

        drawFlower(x, y, stemAngle) {
            push();
            translate(x, y);

            let flowerTilt = stemAngle * 0.3;
            rotate(flowerTilt);

            let baseRadius = 24;
            let t = frameCount * 0.01 + this.noiseSeed;

            // outer petals (larger, darker amber)
            for (let i = 0; i < this.petalCount; i++) {
                let a = (TWO_PI / this.petalCount) * i;
                let wobble = sin(t * 0.7 + i * 0.5) * 0.08;
                let pa = a + wobble;
                let pr = baseRadius * this.petalSizes[i];
                let px = cos(pa) * pr * 0.7;
                let py = sin(pa) * pr * 0.7;

                noStroke();
                fill(212, 145, 26, 220);
                ellipse(px, py, pr * 1.1, pr * 0.7);
            }

            // middle petals (brighter)
            for (let i = 0; i < this.petalCount - 2; i++) {
                let a = (TWO_PI / (this.petalCount - 2)) * i + 0.3;
                let wobble = sin(t * 0.9 + i * 0.7) * 0.06;
                let pa = a + wobble;
                let pr = baseRadius * 0.7;
                let px = cos(pa) * pr * 0.5;
                let py = sin(pa) * pr * 0.5;

                noStroke();
                fill(232, 163, 23, 230);
                ellipse(px, py, pr * 0.9, pr * 0.55);
            }

            // center
            noStroke();
            fill(196, 127, 23);
            ellipse(0, 0, baseRadius * 0.6, baseRadius * 0.6);
            fill(170, 105, 15);
            ellipse(0, 0, baseRadius * 0.35, baseRadius * 0.35);

            pop();
        }
    }
    </script>
</body>
</html>
