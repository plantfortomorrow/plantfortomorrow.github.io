<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant for Tomorrow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        #scene {
            position: relative;
            margin-bottom: 1.5rem;
        }
        #canvas-wrap, #ascii-wrap {
            position: absolute;
            top: 0;
            left: 0;
        }
        #ascii-wrap { display: none; overflow: hidden; }
        #ascii-pre {
            white-space: pre;
            background: transparent;
            margin: 0;
            padding: 0;
            letter-spacing: 0;
        }
        h1 {
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .org {
            font-size: clamp(0.55rem, 1.5vw, 0.75rem);
            color: #555;
            letter-spacing: 0.2em;
        }
        .h1-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        #mode-toggle {
            background: none;
            border: none;
            color: #e8a317;
            font-family: inherit;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            padding: 0;
            margin-left: 0.9em;
            cursor: pointer;
            transition: color 0.3s;
        }
        #mode-toggle:hover { color: #f0c050; }
    </style>
</head>
<body>
    <div id="scene">
        <div id="canvas-wrap"></div>
        <div id="ascii-wrap"><pre id="ascii-pre"></pre></div>
    </div>
    <div class="h1-row">
        <h1>plant for tomorrow</h1>
        <button id="mode-toggle">_</button>
    </div>
    <p class="org">plantfortomorrow.org</p>

    <script>
    // ─── Configuration ───────────────────────────────────────────
    const WIND_SPEED     = 0.4;
    const WIND_TURBULENCE = 0.6;
    const GRAVITY        = 0.02;
    const DAMPING        = 0.92;
    const STIFFNESS      = 0.08;
    const BASE_W         = 900;   // reference design width
    const BASE_H         = 860;
    const ASPECT         = BASE_H / BASE_W;
    const GROUND_FRAC    = 1 - 80 / BASE_H;  // ground line as fraction of height
    const ASCII_COLS_REF = 100;
    const ASCII_ROWS_REF = 50;

    // ─── Solar: Cairo, NY — oldest fossil forest, ~387 Mya ───────
    const CAIRO_LAT = 42.2981;
    const CAIRO_LON = -73.9985;

    const SKY_STOPS = [
        [-18, [4,4,8],    [6,6,12],    [8,12,8]],
        [-6,  [6,8,20],   [12,12,30],  [10,16,12]],
        [-2,  [10,8,22],  [35,20,28],  [14,20,14]],
        [0,   [14,10,18], [55,32,22],  [18,25,16]],
        [5,   [14,16,24], [40,30,22],  [22,30,18]],
        [15,  [10,14,20], [18,20,18],  [20,28,16]],
        [40,  [8,12,16],  [14,16,14],  [18,26,15]],
        [90,  [8,12,16],  [14,16,14],  [18,26,15]],
    ];

    let skyZenith  = [10,10,10];
    let skyHorizon = [10,10,10];
    let skyGround  = [18,26,15];
    let lastSolarCheck = 0;

    // ─── State ───────────────────────────────────────────────────
    let plants = [];
    let renderMode = 'canvas';
    let S = 1;            // scene scale: current width / BASE_W
    let gridCols, gridRows, cellW, cellH;
    let asciiPre, canvasWrap, asciiWrap, toggleBtn, sceneEl;

    // Plant definitions: normalized positions (0–1) and base segment lengths
    const PLANT_DEFS = [
        { xFrac: 0.22, segs: 11, baseLen: 6.4, seed: 0   },
        { xFrac: 0.52, segs: 14, baseLen: 7.0, seed: 100 },
        { xFrac: 0.78, segs: 10, baseLen: 6.0, seed: 200 },
    ];

    // ─── p5: setup ──────────────────────────────────────────────
    function setup() {
        sceneEl   = document.getElementById('scene');
        asciiPre  = document.getElementById('ascii-pre');
        canvasWrap = document.getElementById('canvas-wrap');
        asciiWrap  = document.getElementById('ascii-wrap');
        toggleBtn  = document.getElementById('mode-toggle');
        toggleBtn.addEventListener('click', toggleMode);

        let dims = sceneDims();
        let cnv  = createCanvas(dims.w, dims.h);
        cnv.parent('canvas-wrap');

        for (let def of PLANT_DEFS) {
            plants.push(new Plant(def.xFrac, def.segs, def.baseLen, def.seed));
        }

        applyLayout();
    }

    // ─── p5: windowResized ──────────────────────────────────────
    function windowResized() {
        let dims = sceneDims();
        resizeCanvas(dims.w, dims.h);
        applyLayout();
    }

    // ─── Layout computation ─────────────────────────────────────
    function sceneDims() {
        let w = min(windowWidth - 16, BASE_W);
        let h = round(w * ASPECT);
        // cap height to viewport too
        if (h > windowHeight * 0.78) {
            h = round(windowHeight * 0.78);
            w = round(h / ASPECT);
        }
        return { w, h };
    }

    function applyLayout() {
        S = width / BASE_W;

        sceneEl.style.width  = width + 'px';
        sceneEl.style.height = height + 'px';
        asciiWrap.style.width  = width + 'px';
        asciiWrap.style.height = height + 'px';

        // ASCII grid: scale columns/rows proportionally
        gridCols = max(40, round(ASCII_COLS_REF * S));
        gridRows = max(20, round(ASCII_ROWS_REF * S));
        cellW = width  / gridCols;
        cellH = height / gridRows;

        sizeAsciiFont();
    }

    function groundY() { return height * GROUND_FRAC; }

    // ─── Scaling helpers (p5 idiom: everything relative to S) ───
    function su(v) { return v * S; }   // scale unit

    // ─── ASCII font sizing ──────────────────────────────────────
    function sizeAsciiFont() {
        let m = document.createElement('span');
        m.style.cssText = "font-family:'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;font-size:20px;line-height:1;position:absolute;white-space:pre;visibility:hidden";
        m.textContent = 'X'.repeat(gridCols);
        document.body.appendChild(m);
        let cw20 = m.offsetWidth / gridCols;
        document.body.removeChild(m);
        asciiPre.style.fontSize   = (20 * (width / (cw20 * gridCols))) + 'px';
        asciiPre.style.lineHeight = (height / gridRows) + 'px';
    }

    // ─── Mode toggle ────────────────────────────────────────────
    function keyPressed() {
        if (key === 'a' || key === 'A') toggleMode();
    }

    function toggleMode() {
        renderMode = renderMode === 'canvas' ? 'ascii' : 'canvas';
        canvasWrap.style.display = renderMode === 'canvas' ? 'block' : 'none';
        asciiWrap.style.display  = renderMode === 'ascii'  ? 'block' : 'none';
        toggleBtn.textContent    = renderMode === 'canvas' ? '_' : '\u273F';
    }

    // ─── Solar position ─────────────────────────────────────────
    function getSolarAltitude() {
        let now = new Date();
        let utcH = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
        let jan1 = new Date(now.getFullYear(), 0, 1);
        let doy  = floor((now - jan1) / 86400000) + 1;
        let decR = (-23.45 * cos(TWO_PI/365 * (doy + 10))) * PI/180;
        let solar = utcH + CAIRO_LON/15;
        if (solar < 0)  solar += 24;
        if (solar >= 24) solar -= 24;
        let haR  = (solar - 12) * 15 * PI/180;
        let latR = CAIRO_LAT * PI/180;
        let sinA = sin(latR)*sin(decR) + cos(latR)*cos(decR)*cos(haR);
        return asin(constrain(sinA, -1, 1)) * 180/PI;
    }

    function lerpC(a, b, t) {
        return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
    }

    function interpSky(alt, idx) {
        for (let i = 0; i < SKY_STOPS.length-1; i++) {
            if (alt <= SKY_STOPS[i+1][0]) {
                let t = constrain((alt - SKY_STOPS[i][0]) / (SKY_STOPS[i+1][0] - SKY_STOPS[i][0]), 0, 1);
                return lerpC(SKY_STOPS[i][idx], SKY_STOPS[i+1][idx], t);
            }
        }
        return SKY_STOPS[SKY_STOPS.length-1][idx];
    }

    function updateSky() {
        let alt    = getSolarAltitude();
        skyZenith  = interpSky(alt, 1);
        skyHorizon = interpSky(alt, 2);
        skyGround  = interpSky(alt, 3);
        let z = skyZenith;
        document.body.style.background = `rgb(${round(z[0])},${round(z[1])},${round(z[2])})`;
    }

    // ─── p5: draw ───────────────────────────────────────────────
    function draw() {
        if (frameCount - lastSolarCheck > 300 || lastSolarCheck === 0) {
            updateSky();
            lastSolarCheck = frameCount;
        }

        let t = frameCount * 0.008;
        let wf = (noise(t) - 0.45) * WIND_SPEED
               + (noise(t*3+50) - 0.5) * WIND_SPEED * WIND_TURBULENCE;

        for (let p of plants) {
            p.applyWind(wf, t);
            p.update();
            p.computePoints();
        }

        if (renderMode === 'canvas') drawScene();
        else drawAsciiScene();
    }

    // ─── Canvas renderer ────────────────────────────────────────
    function drawScene() {
        let gy = groundY();

        // sky gradient
        for (let y = 0; y < gy; y++) {
            let c = lerpC(skyZenith, skyHorizon, y/gy);
            stroke(c[0], c[1], c[2]);
            line(0, y, width, y);
        }

        // ground fill
        noStroke();
        fill(skyGround[0], skyGround[1], skyGround[2]);
        rect(0, gy, width, height - gy);

        // ground texture
        for (let i = 0; i < 70; i++) {
            let gx = noise(i*0.3, 999) * width;
            let gy2 = gy + noise(i*0.5, 888) * su(50);
            fill(skyGround[0]+noise(i*0.7)*16, skyGround[1]+noise(i*0.9)*20, skyGround[2]+noise(i*0.4)*12, 120);
            text('~', gx, gy2);
        }

        for (let p of plants) p.drawCanvas();
    }

    // ─── ASCII renderer ─────────────────────────────────────────
    const WIND_CHARS = [' ',' ','.',',','-','~','='];

    function rgbS(r,g,b) { return `rgb(${round(r)},${round(g)},${round(b)})`; }

    function makeGrid() {
        let g = [];
        for (let r = 0; r < gridRows; r++) {
            g[r] = [];
            for (let c = 0; c < gridCols; c++) g[r][c] = {ch:' ', fg:null};
        }
        return g;
    }

    function gSet(grid, px, py, ch, fg) {
        let c = floor(px/cellW), r = floor(py/cellH);
        if (r >= 0 && r < gridRows && c >= 0 && c < gridCols) grid[r][c] = {ch, fg};
    }

    function gLine(grid, x0, y0, x1, y1, fg) {
        let dx = x1-x0, dy = y1-y0;
        let steps = max(ceil(max(abs(dx/cellW), abs(dy/cellH))), 1);
        for (let i = 0; i <= steps; i++) {
            let t = i/steps, x = x0+dx*t, y = y0+dy*t;
            let sl = dx / max(abs(dy), 1);
            let ch = abs(sl) < 0.3 ? '|' : (sl > 0 ? (dy < 0 ? '/' : '\\') : (dy < 0 ? '\\' : '/'));
            gSet(grid, x, y, ch, fg);
        }
    }

    function drawAsciiScene() {
        let grid = makeGrid();
        let t = frameCount * 0.006;
        let gRow = floor(groundY() / cellH);

        // wind field background — sky-tinted
        for (let r = 0; r < gRow; r++) {
            let rowC = lerpC(skyZenith, skyHorizon, r/gRow);
            for (let c = 0; c < gridCols; c++) {
                let nx = c*0.06 + t*3, ny = r*0.08 + t*0.5;
                let n = noise(nx,ny) + noise(nx*2.5+100, ny*2.5+100)*0.4;
                let idx = min(floor(n * (WIND_CHARS.length-1)), WIND_CHARS.length-1);
                if (idx > 0) {
                    let b = 1 + idx*0.15;
                    grid[r][c] = {ch: WIND_CHARS[idx], fg: rgbS(
                        min(255, rowC[0]*b + idx*2),
                        min(255, rowC[1]*b + idx*2),
                        min(255, rowC[2]*b + idx*2))};
                }
            }
        }

        // ground
        for (let r = gRow; r < gridRows; r++)
            for (let c = 0; c < gridCols; c++)
                if (noise(c*0.4+r*0.3, 777) > 0.35) {
                    let b = noise(c*0.2,r*0.5) > 0.5 ? 1.3 : 0.8;
                    grid[r][c] = {ch:'~', fg: rgbS(skyGround[0]*b, skyGround[1]*b, skyGround[2]*b)};
                }

        for (let p of plants) p.drawAsciiGrid(grid);

        // render — run-length encode by color
        let lines = [];
        for (let r = 0; r < gridRows; r++) {
            let line = '', i = 0;
            while (i < gridCols) {
                let fg = grid[r][i].fg, run = '';
                if (!fg) {
                    while (i < gridCols && !grid[r][i].fg) run += grid[r][i++].ch;
                    line += run;
                } else {
                    while (i < gridCols && grid[r][i].fg === fg) run += grid[r][i++].ch;
                    line += `<span style="color:${fg}">${run}</span>`;
                }
            }
            lines.push(line);
        }
        asciiPre.innerHTML = lines.join('\n');
    }

    // ─── Plant ──────────────────────────────────────────────────
    class Plant {
        constructor(xFrac, segCount, baseSegLen, noiseSeed) {
            this.xFrac      = xFrac;       // normalized x (0–1)
            this.segCount    = segCount;
            this.baseSegLen  = baseSegLen;   // segment length at scale=1
            this.noiseSeed   = noiseSeed;
            this.segments    = [];
            this.points      = [];

            for (let i = 0; i < segCount; i++) {
                this.segments.push({
                    angle: 0, velocity: 0, restAngle: 0,
                    windFactor: map(i, 0, segCount-1, 0.1, 1.0),
                    stiffness:  map(i, 0, segCount-1, STIFFNESS*1.5, STIFFNESS*0.6),
                });
            }

            // leaf positions as fractions of stem height
            this.leafDefs = [
                {frac: 0.3,  side:  1, size: 0.8},
                {frac: 0.45, side: -1, size: 1.0},
                {frac: 0.6,  side:  1, size: 0.9},
                {frac: 0.75, side: -1, size: 0.7},
            ];

            this.petalCount = floor(random(10, 16));
            this.petalSizes = Array.from({length: this.petalCount}, () => random(0.8, 1.2));
        }

        // current pixel base position — always from live width/height
        get baseX() { return this.xFrac * width; }
        get baseY() { return groundY(); }
        get segLen() { return this.baseSegLen * S; }

        applyWind(wf, t) {
            for (let i = 0; i < this.segments.length; i++) {
                let seg = this.segments[i];
                let turb = (noise(t*2 + i*0.3 + this.noiseSeed) - 0.5) * 0.02 * WIND_TURBULENCE;
                seg.velocity += wf * seg.windFactor * 0.015 + turb;
            }
        }

        update() {
            for (let seg of this.segments) {
                seg.velocity += -(seg.angle - seg.restAngle) * seg.stiffness - sin(seg.angle) * GRAVITY;
                seg.velocity *= DAMPING;
                seg.angle = constrain(seg.angle + seg.velocity, -0.4, 0.4);
            }
        }

        computePoints() {
            this.points = [{x: this.baseX, y: this.baseY, cumAngle: 0}];
            let ca = 0;
            for (let seg of this.segments) {
                ca += seg.angle;
                let prev = this.points[this.points.length - 1];
                this.points.push({
                    x: prev.x + sin(ca) * this.segLen,
                    y: prev.y - cos(ca) * this.segLen,
                    cumAngle: ca
                });
            }
        }

        leafSegIdx(frac) { return floor(this.segCount * frac); }

        // ── Canvas ──────────────────────────────────────────────
        drawCanvas() {
            let pts = this.points;

            // stem — two-pass for outline/fill
            noFill();
            for (let pass = 0; pass < 2; pass++) {
                stroke(pass === 0 ? color(55,95,65) : color(74,124,89));
                strokeWeight(pass === 0 ? su(7) : su(3));
                beginShape();
                curveVertex(pts[0].x, pts[0].y);
                for (let p of pts) curveVertex(p.x, p.y);
                curveVertex(pts[pts.length-1].x, pts[pts.length-1].y);
                endShape();
            }

            // leaves
            for (let ld of this.leafDefs) {
                let idx = this.leafSegIdx(ld.frac);
                if (idx+1 < pts.length) {
                    let pt = pts[idx+1];
                    this._leafCanvas(pt.x, pt.y, ld.side, ld.size, pt.cumAngle);
                }
            }

            // flower
            let tip = pts[pts.length-1];
            this._flowerCanvas(tip.x, tip.y, tip.cumAngle);
        }

        _leafCanvas(x, y, side, sz, stemAng) {
            push();
            translate(x, y);
            rotate(stemAng + side * 0.8);
            let ll = su(36) * sz, lw = su(14) * sz, tip = su(4);

            noStroke();
            fill(90,158,111, 200);
            beginShape();
            vertex(0, 0);
            bezierVertex(side*lw*0.5, -ll*0.3, side*lw, -ll*0.6, side*tip, -ll);
            bezierVertex(side*-lw*0.3, -ll*0.7, side*-lw*0.2, -ll*0.3, 0, 0);
            endShape(CLOSE);

            stroke(61,107,74);
            strokeWeight(su(1.5));
            noFill();
            beginShape();
            vertex(0, 0);
            bezierVertex(side*lw*0.15, -ll*0.3, side*lw*0.3, -ll*0.5, side*tip, -ll);
            endShape();
            pop();
        }

        _flowerCanvas(x, y, stemAng) {
            push();
            translate(x, y);
            rotate(stemAng * 0.3);
            let br = su(24);
            let t = frameCount * 0.01 + this.noiseSeed;

            // outer petals
            for (let i = 0; i < this.petalCount; i++) {
                let a = TWO_PI/this.petalCount * i + sin(t*0.7+i*0.5)*0.08;
                let pr = br * this.petalSizes[i];
                noStroke(); fill(212,145,26, 220);
                ellipse(cos(a)*pr*0.7, sin(a)*pr*0.7, pr*1.1, pr*0.7);
            }
            // inner petals
            for (let i = 0; i < this.petalCount-2; i++) {
                let a = TWO_PI/(this.petalCount-2) * i + 0.3 + sin(t*0.9+i*0.7)*0.06;
                let pr = br * 0.7;
                noStroke(); fill(232,163,23, 230);
                ellipse(cos(a)*pr*0.5, sin(a)*pr*0.5, pr*0.9, pr*0.55);
            }
            // center
            noStroke();
            fill(196,127,23); ellipse(0,0, br*0.6, br*0.6);
            fill(170,105,15); ellipse(0,0, br*0.35, br*0.35);
            pop();
        }

        // ── ASCII ───────────────────────────────────────────────
        drawAsciiGrid(grid) {
            let pts = this.points;
            for (let i = 0; i < pts.length-1; i++)
                gLine(grid, pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y, '#4a7c59');

            for (let ld of this.leafDefs) {
                let idx = this.leafSegIdx(ld.frac);
                if (idx+1 < pts.length) {
                    let pt = pts[idx+1];
                    this._leafAscii(grid, pt.x, pt.y, ld.side, ld.size, pt.cumAngle);
                }
            }

            let tip = pts[pts.length-1];
            this._flowerAscii(grid, tip.x, tip.y);
        }

        _leafAscii(grid, x, y, side, sz, stemAng) {
            let ll = su(36)*sz, lw = su(14)*sz;
            let ang = stemAng + side*0.8;
            let tx = x + sin(ang)*ll*0.7*side, ty = y - cos(ang)*ll*0.7;
            let steps = max(1, ceil(ll / cellH));

            for (let i = 0; i <= steps; i++) {
                let t = i/steps;
                let lx = x + (tx-x)*t, ly = y + (ty-y)*t;
                let w = sin(t*PI) * lw * 0.4;
                let c = floor(lx/cellW), r = floor(ly/cellH);
                if (r >= 0 && r < gridRows && c >= 0 && c < gridCols) {
                    if (t < 0.15)      grid[r][c] = {ch: side>0?'(':')', fg:'#5a9e6f'};
                    else if (t > 0.85) grid[r][c] = {ch: side>0?'>':'<', fg:'#5a9e6f'};
                    else {
                        grid[r][c] = {ch: side>0?')':'(', fg:'#5a9e6f'};
                        let wc = floor(w/cellW);
                        for (let j = 1; j <= wc; j++) {
                            let cc = c + j*side;
                            if (cc >= 0 && cc < gridCols)
                                grid[r][cc] = {ch: t<0.5?'{':'}', fg:'#3d6b4a'};
                        }
                    }
                }
            }
        }

        _flowerAscii(grid, x, y) {
            let r = su(24);
            let outer = ['*','o','*','o','*','o','*','o'];
            for (let i = 0; i < outer.length; i++) {
                let a = TWO_PI/outer.length * i + frameCount*0.003 + this.noiseSeed;
                gSet(grid, x+cos(a)*r, y+sin(a)*r*0.6, outer[i], '#d4911a');
            }
            let mid = ['.','o','.','o','.','o'];
            for (let i = 0; i < mid.length; i++) {
                let a = TWO_PI/mid.length * i + 0.3 + frameCount*0.002 + this.noiseSeed;
                gSet(grid, x+cos(a)*r*0.55, y+sin(a)*r*0.35, mid[i], '#e8a317');
            }
            gSet(grid, x, y, '@', '#c47f17');
            gSet(grid, x-cellW, y, '*', '#e8a317');
            gSet(grid, x+cellW, y, '*', '#e8a317');
        }
    }
    </script>
</body>
</html>
