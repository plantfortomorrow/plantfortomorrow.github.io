<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant for Tomorrow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }
        #scene {
            width: 900px;
            height: 860px;
            position: relative;
            margin-bottom: 1.5rem;
        }
        #canvas-wrap {
            position: absolute;
            top: 0;
            left: 0;
        }
        #ascii-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 900px;
            height: 860px;
            display: none;
            overflow: hidden;
        }
        #ascii-pre {
            white-space: pre;
            background: #0a0a0a;
            margin: 0;
            padding: 0;
            letter-spacing: 0;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .org {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.2em;
        }
        .h1-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        #mode-toggle {
            background: none;
            border: none;
            color: #333;
            font-family: inherit;
            font-size: 1.2rem;
            padding: 0;
            margin-left: 0.9em;
            cursor: pointer;
            transition: color 0.3s;
        }
        #mode-toggle:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div id="scene">
        <div id="canvas-wrap"></div>
        <div id="ascii-wrap"><pre id="ascii-pre"></pre></div>
    </div>
    <div class="h1-row">
        <h1>plant for tomorrow</h1>
        <button id="mode-toggle">_</button>
    </div>
    <p class="org">plantfortomorrow.org</p>

    <script>
    // --- Forces ---
    const WIND_SPEED = 0.4;
    const WIND_TURBULENCE = 0.6;
    const GRAVITY = 0.02;
    const DAMPING = 0.92;
    const STIFFNESS = 0.08;

    const W = 900;
    const H = 860;
    const GROUND_Y = H - 80;

    // ASCII grid dimensions
    const COLS = 100;
    const ROWS = 50;
    const CELL_W = W / COLS;
    const CELL_H = H / ROWS;

    let plants = [];
    let renderMode = 'canvas'; // 'canvas' or 'ascii'
    let asciiPre;
    let canvasWrap, asciiWrap, toggleBtn;

    function setup() {
        let canvas = createCanvas(W, H);
        canvas.parent('canvas-wrap');

        asciiPre = document.getElementById('ascii-pre');
        canvasWrap = document.getElementById('canvas-wrap');
        asciiWrap = document.getElementById('ascii-wrap');
        toggleBtn = document.getElementById('mode-toggle');

        toggleBtn.addEventListener('click', toggleMode);

        // size ASCII font so grid fills exactly 900x860
        sizeAsciiFont();

        plants.push(new Plant(W * 0.22, GROUND_Y, 11, 6.4, 0.0));
        plants.push(new Plant(W * 0.52, GROUND_Y, 14, 7.0, 100));
        plants.push(new Plant(W * 0.78, GROUND_Y, 10, 6.0, 200));
    }

    function keyPressed() {
        if (key === 'a' || key === 'A') toggleMode();
    }

    function toggleMode() {
        renderMode = renderMode === 'canvas' ? 'ascii' : 'canvas';
        if (renderMode === 'canvas') {
            canvasWrap.style.display = 'block';
            asciiWrap.style.display = 'none';
            toggleBtn.textContent = '_';
        } else {
            canvasWrap.style.display = 'none';
            asciiWrap.style.display = 'block';
            toggleBtn.textContent = '\u273F';
        }
    }

    function sizeAsciiFont() {
        // measure actual character cell size at a reference font-size
        let measure = document.createElement('span');
        measure.style.fontFamily = "'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace";
        measure.style.fontSize = '20px';
        measure.style.lineHeight = '1';
        measure.style.position = 'absolute';
        measure.style.whiteSpace = 'pre';
        measure.style.visibility = 'hidden';
        measure.textContent = 'X'.repeat(COLS);
        document.body.appendChild(measure);
        let charWidth20 = measure.offsetWidth / COLS; // width of one char at 20px
        document.body.removeChild(measure);

        // target: COLS chars = 900px wide
        let targetFontSize = 20 * (W / (charWidth20 * COLS));
        // target: ROWS lines = 860px tall
        let targetLineHeight = H / ROWS;

        asciiPre.style.fontSize = targetFontSize + 'px';
        asciiPre.style.lineHeight = targetLineHeight + 'px';
    }

    function draw() {
        // wind force from Perlin noise
        let t = frameCount * 0.008;
        let windBase = (noise(t) - 0.45) * WIND_SPEED;
        let gust = (noise(t * 3.0 + 50) - 0.5) * WIND_SPEED * WIND_TURBULENCE;
        let windForce = windBase + gust;

        for (let p of plants) {
            p.applyWind(windForce, t);
            p.update();
            p.computePoints();
        }

        if (renderMode === 'canvas') {
            drawCanvas();
        } else {
            drawAscii();
        }
    }

    function drawCanvas() {
        background(10);

        // ground
        noStroke();
        for (let i = 0; i < 70; i++) {
            let gx = noise(i * 0.3, 999) * W;
            let gy = GROUND_Y + noise(i * 0.5, 888) * 50;
            fill(30 + noise(i * 0.7) * 16, 50 + noise(i * 0.9) * 20, 25 + noise(i * 0.4) * 12, 120);
            text('~', gx, gy);
        }

        for (let p of plants) {
            p.drawCanvas();
        }
    }

    // --- ASCII Renderer ---

    function makeGrid() {
        let grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = { ch: ' ', fg: null };
            }
        }
        return grid;
    }

    function gridSet(grid, px, py, ch, fg) {
        let c = Math.floor(px / CELL_W);
        let r = Math.floor(py / CELL_H);
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
            grid[r][c] = { ch, fg };
        }
    }

    function gridLine(grid, x0, y0, x1, y1, fg) {
        let dx = x1 - x0;
        let dy = y1 - y0;
        let steps = Math.max(Math.abs(dx / CELL_W), Math.abs(dy / CELL_H), 1);
        steps = Math.ceil(steps);
        for (let i = 0; i <= steps; i++) {
            let t = steps === 0 ? 0 : i / steps;
            let x = x0 + dx * t;
            let y = y0 + dy * t;
            let slope = steps > 0 ? dx / Math.max(Math.abs(dy), 1) : 0;
            let ch;
            if (Math.abs(slope) < 0.3) ch = '|';
            else if (slope > 0) ch = dy < 0 ? '/' : '\\';
            else ch = dy < 0 ? '\\' : '/';
            gridSet(grid, x, y, ch, fg);
        }
    }

    // characters ordered by visual density for wind visualization
    const WIND_CHARS = [' ', ' ', '.', ',', '-', '~', '='];
    const WIND_COLORS = ['#0d0d0d', '#111', '#141414', '#171717', '#1a1a1a', '#1d1d1d', '#202020'];

    function drawAscii() {
        let grid = makeGrid();
        let t = frameCount * 0.006;

        // Perlin noise wind field background
        let groundRow = Math.floor(GROUND_Y / CELL_H);
        for (let r = 0; r < groundRow; r++) {
            for (let c = 0; c < COLS; c++) {
                // two octaves of noise scrolling with wind
                let nx = c * 0.06 + t * 3;
                let ny = r * 0.08 + t * 0.5;
                let n1 = noise(nx, ny);
                let n2 = noise(nx * 2.5 + 100, ny * 2.5 + 100) * 0.4;
                let n = n1 + n2;

                // map noise to character density
                let idx = Math.floor(n * (WIND_CHARS.length - 1));
                idx = Math.min(idx, WIND_CHARS.length - 1);

                if (idx > 0) {
                    let ci = Math.min(idx, WIND_COLORS.length - 1);
                    grid[r][c] = { ch: WIND_CHARS[idx], fg: WIND_COLORS[ci] };
                }
            }
        }

        // ground
        for (let r = groundRow; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (noise(c * 0.4 + r * 0.3, 777) > 0.35) {
                    let shade = noise(c * 0.2, r * 0.5) > 0.5 ? '#2e4a35' : '#1a2e20';
                    grid[r][c] = { ch: '~', fg: shade };
                }
            }
        }

        // draw each plant
        for (let p of plants) {
            p.drawAsciiGrid(grid);
        }

        // render grid to HTML
        let lines = [];
        for (let r = 0; r < ROWS; r++) {
            let line = '';
            let i = 0;
            while (i < COLS) {
                let cell = grid[r][i];
                if (!cell.fg) {
                    // collect consecutive uncolored cells
                    let run = '';
                    while (i < COLS && !grid[r][i].fg) {
                        run += grid[r][i].ch;
                        i++;
                    }
                    line += run;
                } else {
                    // collect consecutive same-color cells
                    let fg = cell.fg;
                    let run = '';
                    while (i < COLS && grid[r][i].fg === fg) {
                        run += grid[r][i].ch;
                        i++;
                    }
                    line += '<span style="color:' + fg + '">' + run + '</span>';
                }
            }
            lines.push(line);
        }
        asciiPre.innerHTML = lines.join('\n');
    }

    // --- Plant Class ---

    class Plant {
        constructor(x, groundY, segCount, segLen, noiseSeed) {
            this.baseX = x;
            this.baseY = groundY;
            this.segCount = segCount;
            this.segLen = segLen;
            this.noiseSeed = noiseSeed;
            this.segments = [];
            this.leaves = [];
            this.points = [];

            for (let i = 0; i < segCount; i++) {
                this.segments.push({
                    angle: 0,
                    velocity: 0,
                    restAngle: 0,
                    windFactor: map(i, 0, segCount - 1, 0.1, 1.0),
                    stiffness: map(i, 0, segCount - 1, STIFFNESS * 1.5, STIFFNESS * 0.6),
                });
            }

            let leafPositions = [
                { seg: floor(segCount * 0.3), side: 1, size: 0.8 },
                { seg: floor(segCount * 0.45), side: -1, size: 1.0 },
                { seg: floor(segCount * 0.6), side: 1, size: 0.9 },
                { seg: floor(segCount * 0.75), side: -1, size: 0.7 },
            ];
            for (let lp of leafPositions) {
                if (lp.seg < segCount) this.leaves.push(lp);
            }

            this.petalCount = floor(random(10, 16));
            this.petalSizes = [];
            for (let i = 0; i < this.petalCount; i++) {
                this.petalSizes.push(random(0.8, 1.2));
            }
        }

        applyWind(windForce, t) {
            for (let i = 0; i < this.segments.length; i++) {
                let seg = this.segments[i];
                let localWind = windForce * seg.windFactor;
                let turbulence = (noise(t * 2 + i * 0.3 + this.noiseSeed) - 0.5) * 0.02 * WIND_TURBULENCE;
                seg.velocity += localWind * 0.015 + turbulence;
            }
        }

        update() {
            for (let seg of this.segments) {
                let springForce = -(seg.angle - seg.restAngle) * seg.stiffness;
                let gravityForce = -sin(seg.angle) * GRAVITY;
                seg.velocity += springForce + gravityForce;
                seg.velocity *= DAMPING;
                seg.angle += seg.velocity;
                seg.angle = constrain(seg.angle, -0.4, 0.4);
            }
        }

        computePoints() {
            this.points = [{ x: this.baseX, y: this.baseY, cumAngle: 0 }];
            let cumulativeAngle = 0;
            for (let i = 0; i < this.segments.length; i++) {
                cumulativeAngle += this.segments[i].angle;
                let prev = this.points[this.points.length - 1];
                this.points.push({
                    x: prev.x + sin(cumulativeAngle) * this.segLen,
                    y: prev.y - cos(cumulativeAngle) * this.segLen,
                    cumAngle: cumulativeAngle,
                });
            }
        }

        // --- Canvas drawing ---

        drawCanvas() {
            let pts = this.points;

            noFill();
            for (let w = 0; w < 2; w++) {
                let sw = w === 0 ? 7 : 3;
                let sc = w === 0 ? color(55, 95, 65) : color(74, 124, 89);
                stroke(sc);
                strokeWeight(sw);
                beginShape();
                curveVertex(pts[0].x, pts[0].y);
                for (let p of pts) curveVertex(p.x, p.y);
                curveVertex(pts[pts.length - 1].x, pts[pts.length - 1].y);
                endShape();
            }

            for (let lf of this.leaves) {
                let pt = pts[lf.seg + 1];
                this.drawLeafCanvas(pt.x, pt.y, lf.side, lf.size, pt.cumAngle);
            }

            let tip = pts[pts.length - 1];
            this.drawFlowerCanvas(tip.x, tip.y, tip.cumAngle);
        }

        drawLeafCanvas(x, y, side, sz, stemAngle) {
            push();
            translate(x, y);
            rotate(stemAngle + side * 0.8);
            let leafLen = 36 * sz;
            let leafWidth = 14 * sz;

            noStroke();
            fill(90, 158, 111, 200);
            beginShape();
            vertex(0, 0);
            bezierVertex(side * leafWidth * 0.5, -leafLen * 0.3, side * leafWidth, -leafLen * 0.6, side * 4, -leafLen);
            bezierVertex(side * -leafWidth * 0.3, -leafLen * 0.7, side * -leafWidth * 0.2, -leafLen * 0.3, 0, 0);
            endShape(CLOSE);

            stroke(61, 107, 74);
            strokeWeight(1.5);
            noFill();
            beginShape();
            vertex(0, 0);
            bezierVertex(side * leafWidth * 0.15, -leafLen * 0.3, side * leafWidth * 0.3, -leafLen * 0.5, side * 4, -leafLen);
            endShape();
            pop();
        }

        drawFlowerCanvas(x, y, stemAngle) {
            push();
            translate(x, y);
            rotate(stemAngle * 0.3);
            let baseRadius = 24;
            let t = frameCount * 0.01 + this.noiseSeed;

            for (let i = 0; i < this.petalCount; i++) {
                let a = (TWO_PI / this.petalCount) * i;
                let wobble = sin(t * 0.7 + i * 0.5) * 0.08;
                let pa = a + wobble;
                let pr = baseRadius * this.petalSizes[i];
                noStroke();
                fill(212, 145, 26, 220);
                ellipse(cos(pa) * pr * 0.7, sin(pa) * pr * 0.7, pr * 1.1, pr * 0.7);
            }
            for (let i = 0; i < this.petalCount - 2; i++) {
                let a = (TWO_PI / (this.petalCount - 2)) * i + 0.3;
                let wobble = sin(t * 0.9 + i * 0.7) * 0.06;
                let pa = a + wobble;
                let pr = baseRadius * 0.7;
                noStroke();
                fill(232, 163, 23, 230);
                ellipse(cos(pa) * pr * 0.5, sin(pa) * pr * 0.5, pr * 0.9, pr * 0.55);
            }
            noStroke();
            fill(196, 127, 23);
            ellipse(0, 0, baseRadius * 0.6, baseRadius * 0.6);
            fill(170, 105, 15);
            ellipse(0, 0, baseRadius * 0.35, baseRadius * 0.35);
            pop();
        }

        // --- ASCII drawing ---

        drawAsciiGrid(grid) {
            let pts = this.points;
            let stemColor = '#4a7c59';

            // stem
            for (let i = 0; i < pts.length - 1; i++) {
                gridLine(grid, pts[i].x, pts[i].y, pts[i + 1].x, pts[i + 1].y, stemColor);
            }

            // leaves
            for (let lf of this.leaves) {
                let pt = pts[lf.seg + 1];
                this.drawLeafAscii(grid, pt.x, pt.y, lf.side, lf.size, pt.cumAngle);
            }

            // flower
            let tip = pts[pts.length - 1];
            this.drawFlowerAscii(grid, tip.x, tip.y);
        }

        drawLeafAscii(grid, x, y, side, sz, stemAngle) {
            let leafLen = 36 * sz;
            let leafWidth = 14 * sz;
            let ang = stemAngle + side * 0.8;
            let leafColor = '#5a9e6f';
            let veinColor = '#3d6b4a';

            // draw leaf as a short angled line with characters
            let tipX = x + Math.sin(ang) * leafLen * 0.7 * side;
            let tipY = y - Math.cos(ang) * leafLen * 0.7;
            let midX = x + Math.sin(ang) * leafLen * 0.35 * side;
            let midY = y - Math.cos(ang) * leafLen * 0.35;

            // leaf body - a few characters along the leaf
            let steps = Math.ceil(leafLen / CELL_H);
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                let lx = x + (tipX - x) * t;
                let ly = y + (tipY - y) * t;
                // leaf width varies along length (widest at middle)
                let w = Math.sin(t * Math.PI) * leafWidth * 0.4;

                let c = Math.floor(lx / CELL_W);
                let r = Math.floor(ly / CELL_H);
                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                    // choose character based on position
                    if (t < 0.15) {
                        grid[r][c] = { ch: side > 0 ? '(' : ')', fg: leafColor };
                    } else if (t > 0.85) {
                        grid[r][c] = { ch: side > 0 ? '>' : '<', fg: leafColor };
                    } else {
                        grid[r][c] = { ch: side > 0 ? ')' : '(', fg: leafColor };
                        // width chars on either side
                        let wc = Math.floor(w / CELL_W);
                        for (let j = 1; j <= wc; j++) {
                            let cc = c + j * side;
                            if (cc >= 0 && cc < COLS) {
                                grid[r][cc] = { ch: t < 0.5 ? '{' : '}', fg: veinColor };
                            }
                        }
                    }
                }
            }
        }

        drawFlowerAscii(grid, x, y) {
            let amber = '#e8a317';
            let darkAmber = '#d4911a';
            let center = '#c47f17';
            let r = 24; // radius in pixels

            // flower pattern - rings of characters
            // outer ring
            let outerChars = ['*', 'o', '*', 'o', '*', 'o', '*', 'o'];
            for (let i = 0; i < outerChars.length; i++) {
                let a = (Math.PI * 2 / outerChars.length) * i + frameCount * 0.003 + this.noiseSeed;
                let px = x + Math.cos(a) * r;
                let py = y + Math.sin(a) * r * 0.6;
                gridSet(grid, px, py, outerChars[i], darkAmber);
            }

            // middle ring
            let midChars = ['.', 'o', '.', 'o', '.', 'o'];
            for (let i = 0; i < midChars.length; i++) {
                let a = (Math.PI * 2 / midChars.length) * i + 0.3 + frameCount * 0.002 + this.noiseSeed;
                let px = x + Math.cos(a) * r * 0.55;
                let py = y + Math.sin(a) * r * 0.35;
                gridSet(grid, px, py, midChars[i], amber);
            }

            // center
            gridSet(grid, x, y, '@', center);
            // fill gaps around center
            gridSet(grid, x - CELL_W, y, '*', amber);
            gridSet(grid, x + CELL_W, y, '*', amber);
        }
    }
    </script>
</body>
</html>
