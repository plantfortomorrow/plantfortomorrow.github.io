<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant for Tomorrow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .art {
            font-size: 14px;
            line-height: 1.3;
            white-space: pre;
            text-align: center;
            margin-bottom: 2rem;
        }
        .stem   { color: #4a7c59; }
        .leaf   { color: #5a9e6f; }
        .petal  { color: #e8a317; }
        .center { color: #c47f17; }
        .pot    { color: #8b5e3c; }
        .soil   { color: #5c3d2e; }
        .rim    { color: #a0714f; }
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .org {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="art"><span class="petal">        . * .
      * .o.o. *
     . o.o.o.o .
      * .o.o. *
        ' * '</span>
<span class="stem">         |</span><span class="leaf">  _
</span><span class="stem">         |</span><span class="leaf"> / )
</span><span class="stem">         |/ /</span>
<span class="leaf">    _    </span><span class="stem">|</span>
<span class="leaf">   ( \   </span><span class="stem">|</span>
<span class="leaf">    \ \  </span><span class="stem">|</span>
<span class="leaf">     \_\ </span><span class="stem">|</span>
<span class="stem">         |</span>
<span class="rim">     .-------.</span>
<span class="pot">     |       |</span>
<span class="soil">     |~~~~~~~|</span>
<span class="pot">      \     /</span>
<span class="pot">       \   /</span>
<span class="pot">        \_/</span></div>
    <h1>hello world</h1>
    <p class="org">plantfortomorrow.org</p>
</body>
</html>
